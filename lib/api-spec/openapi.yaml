openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Lyra personal productivity API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: tasks
    description: Task management
  - name: habits
    description: Habit tracking
  - name: events
    description: Calendar events
  - name: prayers
    description: Prayer tracking
  - name: focus
    description: Focus / Pomodoro sessions
  - name: summary
    description: Daily summary for automation
  - name: islamic
    description: Islamic life module (Quran tracker, deeds catalog)
  - name: settings
    description: User settings and preferences
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ─── TASKS ───────────────────────────────────────────────────────────────────
  /tasks:
    get:
      operationId: listTasks
      tags: [tasks]
      summary: List tasks
      parameters:
        - name: date
          in: query
          schema:
            type: ["string", "null"]
          description: Filter by due date (YYYY-MM-DD)
        - name: status
          in: query
          schema:
            type: ["string", "null"]
          description: Filter by status (pending, done, all)
        - name: priority
          in: query
          schema:
            type: ["string", "null"]
          description: Filter by priority (none, low, medium, high)
      responses:
        "200":
          description: List of tasks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Task"
    post:
      operationId: createTask
      tags: [tasks]
      summary: Create a task
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTaskBody"
      responses:
        "201":
          description: Created task
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"

  /tasks/recurring:
    get:
      operationId: listRecurringTasks
      tags: [tasks]
      summary: List recurring task templates
      responses:
        "200":
          description: List of recurring task templates
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Task"

  /tasks/{id}:
    get:
      operationId: getTask
      tags: [tasks]
      summary: Get task by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Task
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
        "404":
          description: Not found
    patch:
      operationId: updateTask
      tags: [tasks]
      summary: Update a task
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTaskBody"
      responses:
        "200":
          description: Updated task
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
        "404":
          description: Not found
    delete:
      operationId: deleteTask
      tags: [tasks]
      summary: Delete a task
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  /tasks/today:
    get:
      operationId: getTodayTasks
      tags: [tasks]
      summary: Get today's tasks summary
      responses:
        "200":
          description: Tasks summary for today
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TodayTasksSummary"

  # ─── HABITS ──────────────────────────────────────────────────────────────────
  /habits:
    get:
      operationId: listHabits
      tags: [habits]
      summary: List habits
      responses:
        "200":
          description: List of habits
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Habit"
    post:
      operationId: createHabit
      tags: [habits]
      summary: Create a habit
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateHabitBody"
      responses:
        "201":
          description: Created habit
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Habit"

  /habits/{id}:
    patch:
      operationId: updateHabit
      tags: [habits]
      summary: Update a habit
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateHabitBody"
      responses:
        "200":
          description: Updated habit
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Habit"
    delete:
      operationId: deleteHabit
      tags: [habits]
      summary: Delete a habit
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  /habits/{id}/log:
    post:
      operationId: logHabit
      tags: [habits]
      summary: Log a habit completion for a date
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LogHabitBody"
      responses:
        "200":
          description: Habit log entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HabitLog"

  /habits/today:
    get:
      operationId: getTodayHabits
      tags: [habits]
      summary: Get all habits with today's completion status
      responses:
        "200":
          description: Habits with today's status
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/HabitWithStatus"

  # ─── CALENDAR EVENTS ─────────────────────────────────────────────────────────
  /events:
    get:
      operationId: listEvents
      tags: [events]
      summary: List calendar events
      parameters:
        - name: start
          in: query
          schema:
            type: ["string", "null"]
          description: Start date filter (YYYY-MM-DD)
        - name: end
          in: query
          schema:
            type: ["string", "null"]
          description: End date filter (YYYY-MM-DD)
      responses:
        "200":
          description: List of events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CalendarEvent"
    post:
      operationId: createEvent
      tags: [events]
      summary: Create a calendar event
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEventBody"
      responses:
        "201":
          description: Created event
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CalendarEvent"

  /events/{id}:
    patch:
      operationId: updateEvent
      tags: [events]
      summary: Update an event
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateEventBody"
      responses:
        "200":
          description: Updated event
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CalendarEvent"
    delete:
      operationId: deleteEvent
      tags: [events]
      summary: Delete an event
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  # ─── PRAYERS ─────────────────────────────────────────────────────────────────
  /prayers:
    get:
      operationId: listPrayers
      tags: [prayers]
      summary: List prayer logs for a date
      parameters:
        - name: date
          in: query
          schema:
            type: ["string", "null"]
          description: Date filter (YYYY-MM-DD, defaults to today)
      responses:
        "200":
          description: List of prayer entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Prayer"

  /prayers/{id}:
    patch:
      operationId: updatePrayer
      tags: [prayers]
      summary: Update a prayer's status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePrayerBody"
      responses:
        "200":
          description: Updated prayer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Prayer"

  /prayers/seed:
    post:
      operationId: seedPrayers
      tags: [prayers]
      summary: Seed today's 5 prayers if not yet seeded
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SeedPrayersBody"
      responses:
        "200":
          description: Seeded or existing prayers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Prayer"

  # ─── FOCUS SESSIONS ──────────────────────────────────────────────────────────
  /focus:
    get:
      operationId: listFocusSessions
      tags: [focus]
      summary: List focus sessions
      parameters:
        - name: date
          in: query
          schema:
            type: ["string", "null"]
          description: Filter by date (YYYY-MM-DD)
      responses:
        "200":
          description: List of focus sessions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FocusSession"
    post:
      operationId: createFocusSession
      tags: [focus]
      summary: Create/log a focus session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateFocusSessionBody"
      responses:
        "201":
          description: Created focus session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FocusSession"

  /focus/{id}:
    patch:
      operationId: updateFocusSession
      tags: [focus]
      summary: Update a focus session
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateFocusSessionBody"
      responses:
        "200":
          description: Updated focus session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FocusSession"
    delete:
      operationId: deleteFocusSession
      tags: [focus]
      summary: Delete a focus session
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  /focus/stats:
    get:
      operationId: getFocusStats
      tags: [focus]
      summary: Get focus stats (weekly breakdown)
      responses:
        "200":
          description: Focus stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FocusStats"

  # ─── PRAYERS CALCULATE ───────────────────────────────────────────────────────
  /prayers/calculate:
    post:
      operationId: calculatePrayerTimes
      tags: [prayers]
      summary: Calculate prayer times from coordinates and seed today's prayers
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CalculatePrayerTimesBody"
      responses:
        "200":
          description: Calculated and seeded prayers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Prayer"

  # ─── QURAN PROGRESS ──────────────────────────────────────────────────────────
  /quran:
    get:
      operationId: getQuranProgress
      tags: [islamic]
      summary: Get current Quran reading progress
      responses:
        "200":
          description: Current Khatmah progress
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuranProgress"
        "404":
          description: No progress found
    post:
      operationId: initQuranProgress
      tags: [islamic]
      summary: Initialize a new Khatmah
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InitQuranProgressBody"
      responses:
        "201":
          description: Created Khatmah progress
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuranProgress"
    patch:
      operationId: updateQuranProgress
      tags: [islamic]
      summary: Update reading progress
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateQuranProgressBody"
      responses:
        "200":
          description: Updated progress
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuranProgress"

  # ─── ISLAMIC DEEDS ───────────────────────────────────────────────────────────
  /deeds:
    get:
      operationId: listDeeds
      tags: [islamic]
      summary: List Islamic activities catalog with optional today filter
      parameters:
        - name: todayOnly
          in: query
          schema:
            type: ["boolean", "null"]
          description: If true, returns only deeds relevant to today (day of week / hijri date)
        - name: date
          in: query
          schema:
            type: ["string", "null"]
          description: Date to filter by (YYYY-MM-DD, defaults to today when todayOnly=true)
      responses:
        "200":
          description: List of Islamic activities
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/IslamicActivity"

  /deeds/{id}/log:
    post:
      operationId: logDeed
      tags: [islamic]
      summary: Log completion or intention for a deed
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LogDeedBody"
      responses:
        "201":
          description: Logged deed entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActivityLog"

  /deeds/logs:
    get:
      operationId: listDeedLogs
      tags: [islamic]
      summary: Get deed activity logs
      parameters:
        - name: date
          in: query
          schema:
            type: ["string", "null"]
          description: Filter by date (YYYY-MM-DD, defaults to today)
      responses:
        "200":
          description: Activity logs with deed details
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityLogWithDeed"

  # ─── DAILY SUMMARY ───────────────────────────────────────────────────────────
  /daily-summary:
    get:
      operationId: getDailySummary
      tags: [summary]
      summary: Get unified daily summary for AI automation
      parameters:
        - name: date
          in: query
          schema:
            type: ["string", "null"]
          description: Date (YYYY-MM-DD, defaults to today)
      responses:
        "200":
          description: Daily summary for all modules
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DailySummary"

  /reports:
    get:
      operationId: getReport
      tags: [reports]
      summary: Get weekly or monthly productivity report
      parameters:
        - name: period
          in: query
          schema:
            type: string
            enum: [weekly, monthly]
          description: "Report period (default: weekly)"
        - name: date
          in: query
          schema:
            type: ["string", "null"]
          description: "Anchor date YYYY-MM-DD (defaults to today)"
      responses:
        "200":
          description: Aggregated report for the period
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Report"

  # ─── SETTINGS ────────────────────────────────────────────────────────────────
  /gamification:
    get:
      operationId: getGamificationSummary
      tags: [gamification]
      summary: Get XP, level, today's score breakdown, and habit streaks
      responses:
        "200":
          description: Gamification summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GamificationSummary"

  /settings:
    get:
      operationId: getSettings
      tags: [settings]
      summary: Get user settings (auto-creates defaults on first call)
      responses:
        "200":
          description: User settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserSettings"
    patch:
      operationId: updateSettings
      tags: [settings]
      summary: Update user settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSettingsBody"
      responses:
        "200":
          description: Updated settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserSettings"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    # ─── TASK SCHEMAS ───────────────────────────────────────────────────────────
    Task:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        description:
          type: ["string", "null"]
        status:
          type: string
          enum: [pending, done]
        priority:
          type: string
          enum: [none, low, medium, high]
        dueDate:
          type: ["string", "null"]
        dueTime:
          type: ["string", "null"]
        list:
          type: ["string", "null"]
        tags:
          type: array
          items:
            type: string
        completedAt:
          type: ["string", "null"]
        recurrence:
          type: string
          enum: [none, daily, weekly, monthly]
        templateId:
          type: ["string", "null"]
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - title
        - status
        - priority
        - tags
        - recurrence
        - createdAt
        - updatedAt

    CreateTaskBody:
      type: object
      properties:
        title:
          type: string
        description:
          type: ["string", "null"]
        priority:
          type: string
          enum: [none, low, medium, high]
        dueDate:
          type: ["string", "null"]
        dueTime:
          type: ["string", "null"]
        list:
          type: ["string", "null"]
        tags:
          type: array
          items:
            type: string
        recurrence:
          type: string
          enum: [none, daily, weekly, monthly]
      required:
        - title

    UpdateTaskBody:
      type: object
      properties:
        title:
          type: ["string", "null"]
        description:
          type: ["string", "null"]
        status:
          type: ["string", "null"]
        priority:
          type: ["string", "null"]
        dueDate:
          type: ["string", "null"]
        dueTime:
          type: ["string", "null"]
        list:
          type: ["string", "null"]
        tags:
          type: array
          items:
            type: string
        recurrence:
          type: ["string", "null"]

    TodayTasksSummary:
      type: object
      properties:
        total:
          type: integer
        done:
          type: integer
        pending:
          type: integer
        highPriority:
          type: integer
        tasks:
          type: array
          items:
            $ref: "#/components/schemas/Task"
      required:
        - total
        - done
        - pending
        - highPriority
        - tasks

    # ─── HABIT SCHEMAS ──────────────────────────────────────────────────────────
    Habit:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        category:
          type: ["string", "null"]
        timeOfDay:
          type: string
          enum: [morning, afternoon, evening, anytime]
        type:
          type: string
          enum: [positive, negative]
        streak:
          type: integer
        bestStreak:
          type: integer
        isArchived:
          type: boolean
        createdAt:
          type: string
      required:
        - id
        - name
        - timeOfDay
        - type
        - streak
        - bestStreak
        - isArchived
        - createdAt

    CreateHabitBody:
      type: object
      properties:
        name:
          type: string
        category:
          type: ["string", "null"]
        timeOfDay:
          type: string
          enum: [morning, afternoon, evening, anytime]
        type:
          type: string
          enum: [positive, negative]
      required:
        - name

    UpdateHabitBody:
      type: object
      properties:
        name:
          type: ["string", "null"]
        category:
          type: ["string", "null"]
        timeOfDay:
          type: ["string", "null"]
        isArchived:
          type: ["boolean", "null"]

    HabitLog:
      type: object
      properties:
        id:
          type: string
        habitId:
          type: string
        date:
          type: string
        status:
          type: string
          enum: [completed, skipped, missed]
        loggedAt:
          type: string
      required:
        - id
        - habitId
        - date
        - status
        - loggedAt

    LogHabitBody:
      type: object
      properties:
        date:
          type: string
          description: Date in YYYY-MM-DD format
        status:
          type: string
          enum: [completed, skipped, missed]
      required:
        - date
        - status

    HabitWithStatus:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        category:
          type: ["string", "null"]
        timeOfDay:
          type: string
          enum: [morning, afternoon, evening, anytime]
        type:
          type: string
          enum: [positive, negative]
        streak:
          type: integer
        bestStreak:
          type: integer
        isArchived:
          type: boolean
        createdAt:
          type: string
        todayStatus:
          type: ["string", "null"]
      required:
        - id
        - name
        - timeOfDay
        - type
        - streak
        - bestStreak
        - isArchived
        - createdAt

    # ─── CALENDAR EVENT SCHEMAS ─────────────────────────────────────────────────
    CalendarEvent:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        description:
          type: ["string", "null"]
        location:
          type: ["string", "null"]
        startTime:
          type: string
        endTime:
          type: ["string", "null"]
        allDay:
          type: boolean
        category:
          type: ["string", "null"]
        source:
          type: string
          enum: [native, task, prayer]
        createdAt:
          type: string
      required:
        - id
        - title
        - startTime
        - allDay
        - source
        - createdAt

    CreateEventBody:
      type: object
      properties:
        title:
          type: string
        description:
          type: ["string", "null"]
        location:
          type: ["string", "null"]
        startTime:
          type: string
        endTime:
          type: ["string", "null"]
        allDay:
          type: boolean
        category:
          type: ["string", "null"]
      required:
        - title
        - startTime

    UpdateEventBody:
      type: object
      properties:
        title:
          type: ["string", "null"]
        description:
          type: ["string", "null"]
        location:
          type: ["string", "null"]
        startTime:
          type: ["string", "null"]
        endTime:
          type: ["string", "null"]
        allDay:
          type: ["boolean", "null"]
        category:
          type: ["string", "null"]

    # ─── PRAYER SCHEMAS ─────────────────────────────────────────────────────────
    Prayer:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
          enum: [Fajr, Dhuhr, Asr, Maghrib, Isha]
        date:
          type: string
        scheduledTime:
          type: ["string", "null"]
        status:
          type: string
          enum: [pending, on_time, late, missed]
        completedAt:
          type: ["string", "null"]
      required:
        - id
        - name
        - date
        - status

    UpdatePrayerBody:
      type: object
      properties:
        status:
          type: string
          enum: [pending, on_time, late, missed]
