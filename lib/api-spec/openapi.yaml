openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Lyra personal productivity API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: tasks
    description: Task management
  - name: habits
    description: Habit tracking
  - name: events
    description: Calendar events
  - name: prayers
    description: Prayer tracking
  - name: focus
    description: Focus / Pomodoro sessions
  - name: summary
    description: Daily summary for automation
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ─── TASKS ───────────────────────────────────────────────────────────────────
  /tasks:
    get:
      operationId: listTasks
      tags: [tasks]
      summary: List tasks
      parameters:
        - name: date
          in: query
          schema:
            type: ["string", "null"]
          description: Filter by due date (YYYY-MM-DD)
        - name: status
          in: query
          schema:
            type: ["string", "null"]
          description: Filter by status (pending, done, all)
        - name: priority
          in: query
          schema:
            type: ["string", "null"]
          description: Filter by priority (none, low, medium, high)
      responses:
        "200":
          description: List of tasks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Task"
    post:
      operationId: createTask
      tags: [tasks]
      summary: Create a task
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTaskBody"
      responses:
        "201":
          description: Created task
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"

  /tasks/{id}:
    get:
      operationId: getTask
      tags: [tasks]
      summary: Get task by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Task
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
        "404":
          description: Not found
    patch:
      operationId: updateTask
      tags: [tasks]
      summary: Update a task
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTaskBody"
      responses:
        "200":
          description: Updated task
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
        "404":
          description: Not found
    delete:
      operationId: deleteTask
      tags: [tasks]
      summary: Delete a task
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  /tasks/today:
    get:
      operationId: getTodayTasks
      tags: [tasks]
      summary: Get today's tasks summary
      responses:
        "200":
          description: Tasks summary for today
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TodayTasksSummary"

  # ─── HABITS ──────────────────────────────────────────────────────────────────
  /habits:
    get:
      operationId: listHabits
      tags: [habits]
      summary: List habits
      responses:
        "200":
          description: List of habits
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Habit"
    post:
      operationId: createHabit
      tags: [habits]
      summary: Create a habit
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateHabitBody"
      responses:
        "201":
          description: Created habit
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Habit"

  /habits/{id}:
    patch:
      operationId: updateHabit
      tags: [habits]
      summary: Update a habit
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateHabitBody"
      responses:
        "200":
          description: Updated habit
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Habit"
    delete:
      operationId: deleteHabit
      tags: [habits]
      summary: Delete a habit
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  /habits/{id}/log:
    post:
      operationId: logHabit
      tags: [habits]
      summary: Log a habit completion for a date
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LogHabitBody"
      responses:
        "200":
          description: Habit log entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HabitLog"

  /habits/today:
    get:
      operationId: getTodayHabits
      tags: [habits]
      summary: Get all habits with today's completion status
      responses:
        "200":
          description: Habits with today's status
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/HabitWithStatus"

  # ─── CALENDAR EVENTS ─────────────────────────────────────────────────────────
  /events:
    get:
      operationId: listEvents
      tags: [events]
      summary: List calendar events
      parameters:
        - name: start
          in: query
          schema:
            type: ["string", "null"]
          description: Start date filter (YYYY-MM-DD)
        - name: end
          in: query
          schema:
            type: ["string", "null"]
          description: End date filter (YYYY-MM-DD)
      responses:
        "200":
          description: List of events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CalendarEvent"
    post:
      operationId: createEvent
      tags: [events]
      summary: Create a calendar event
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEventBody"
      responses:
        "201":
          description: Created event
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CalendarEvent"

  /events/{id}:
    patch:
      operationId: updateEvent
      tags: [events]
      summary: Update an event
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateEventBody"
      responses:
        "200":
          description: Updated event
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CalendarEvent"
    delete:
      operationId: deleteEvent
      tags: [events]
      summary: Delete an event
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  # ─── PRAYERS ─────────────────────────────────────────────────────────────────
  /prayers:
    get:
      operationId: listPrayers
      tags: [prayers]
      summary: List prayer logs for a date
      parameters:
        - name: date
          in: query
          schema:
            type: ["string", "null"]
          description: Date filter (YYYY-MM-DD, defaults to today)
      responses:
        "200":
          description: List of prayer entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Prayer"

  /prayers/{id}:
    patch:
      operationId: updatePrayer
      tags: [prayers]
      summary: Update a prayer's status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePrayerBody"
      responses:
        "200":
          description: Updated prayer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Prayer"

  /prayers/seed:
    post:
      operationId: seedPrayers
      tags: [prayers]
      summary: Seed today's 5 prayers if not yet seeded
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SeedPrayersBody"
      responses:
        "200":
          description: Seeded or existing prayers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Prayer"

  # ─── FOCUS SESSIONS ──────────────────────────────────────────────────────────
  /focus:
    get:
      operationId: listFocusSessions
      tags: [focus]
      summary: List focus sessions
      parameters:
        - name: date
          in: query
          schema:
            type: ["string", "null"]
          description: Filter by date (YYYY-MM-DD)
      responses:
        "200":
          description: List of focus sessions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FocusSession"
    post:
      operationId: createFocusSession
      tags: [focus]
      summary: Create/log a focus session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateFocusSessionBody"
      responses:
        "201":
          description: Created focus session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FocusSession"

  /focus/{id}:
    patch:
      operationId: updateFocusSession
      tags: [focus]
      summary: Update a focus session
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateFocusSessionBody"
      responses:
        "200":
          description: Updated focus session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FocusSession"
    delete:
      operationId: deleteFocusSession
      tags: [focus]
      summary: Delete a focus session
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  /focus/stats:
    get:
      operationId: getFocusStats
      tags: [focus]
      summary: Get focus stats (weekly breakdown)
      responses:
        "200":
          description: Focus stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FocusStats"

  # ─── DAILY SUMMARY ───────────────────────────────────────────────────────────
  /daily-summary:
    get:
      operationId: getDailySummary
      tags: [summary]
      summary: Get unified daily summary for AI automation
      parameters:
        - name: date
          in: query
          schema:
            type: ["string", "null"]
          description: Date (YYYY-MM-DD, defaults to today)
      responses:
        "200":
          description: Daily summary for all modules
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DailySummary"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    # ─── TASK SCHEMAS ───────────────────────────────────────────────────────────
    Task:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        description:
          type: ["string", "null"]
        status:
          type: string
          enum: [pending, done]
        priority:
          type: string
          enum: [none, low, medium, high]
        dueDate:
          type: ["string", "null"]
        dueTime:
          type: ["string", "null"]
        list:
          type: ["string", "null"]
        tags:
          type: array
          items:
            type: string
        completedAt:
          type: ["string", "null"]
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - title
        - status
        - priority
        - tags
        - createdAt
        - updatedAt

    CreateTaskBody:
      type: object
      properties:
        title:
          type: string
        description:
          type: ["string", "null"]
        priority:
          type: string
          enum: [none, low, medium, high]
        dueDate:
          type: ["string", "null"]
        dueTime:
          type: ["string", "null"]
        list:
          type: ["string", "null"]
        tags:
          type: array
          items:
            type: string
      required:
        - title

    UpdateTaskBody:
      type: object
      properties:
        title:
          type: ["string", "null"]
        description:
          type: ["string", "null"]
        status:
          type: ["string", "null"]
        priority:
          type: ["string", "null"]
        dueDate:
          type: ["string", "null"]
        dueTime:
          type: ["string", "null"]
        list:
          type: ["string", "null"]
        tags:
          type: array
          items:
            type: string

    TodayTasksSummary:
      type: object
      properties:
        total:
          type: integer
        done:
          type: integer
        pending:
          type: integer
        highPriority:
          type: integer
        tasks:
          type: array
          items:
            $ref: "#/components/schemas/Task"
      required:
        - total
        - done
        - pending
        - highPriority
        - tasks

    # ─── HABIT SCHEMAS ──────────────────────────────────────────────────────────
    Habit:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        category:
          type: ["string", "null"]
        timeOfDay:
          type: string
          enum: [morning, afternoon, evening, anytime]
        type:
          type: string
          enum: [positive, negative]
        streak:
          type: integer
        isArchived:
          type: boolean
        createdAt:
          type: string
      required:
        - id
        - name
        - timeOfDay
        - type
        - streak
        - isArchived
        - createdAt

    CreateHabitBody:
      type: object
      properties:
        name:
          type: string
        category:
          type: ["string", "null"]
        timeOfDay:
          type: string
          enum: [morning, afternoon, evening, anytime]
        type:
          type: string
          enum: [positive, negative]
      required:
        - name

    UpdateHabitBody:
      type: object
      properties:
        name:
          type: ["string", "null"]
        category:
          type: ["string", "null"]
        timeOfDay:
          type: ["string", "null"]
        isArchived:
          type: ["boolean", "null"]

    HabitLog:
      type: object
      properties:
        id:
          type: string
        habitId:
          type: string
        date:
          type: string
        status:
          type: string
          enum: [completed, skipped, missed]
        loggedAt:
          type: string
      required:
        - id
        - habitId
        - date
        - status
        - loggedAt

    LogHabitBody:
      type: object
      properties:
        date:
          type: string
          description: Date in YYYY-MM-DD format
        status:
          type: string
          enum: [completed, skipped, missed]
      required:
        - date
        - status

    HabitWithStatus:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        category:
          type: ["string", "null"]
        timeOfDay:
          type: string
          enum: [morning, afternoon, evening, anytime]
        type:
          type: string
          enum: [positive, negative]
        streak:
          type: integer
        isArchived:
          type: boolean
        createdAt:
          type: string
        todayStatus:
          type: ["string", "null"]
      required:
        - id
        - name
        - timeOfDay
        - type
        - streak
        - isArchived
        - createdAt

    # ─── CALENDAR EVENT SCHEMAS ─────────────────────────────────────────────────
    CalendarEvent:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        description:
          type: ["string", "null"]
        location:
          type: ["string", "null"]
        startTime:
          type: string
        endTime:
          type: ["string", "null"]
        allDay:
          type: boolean
        category:
          type: ["string", "null"]
        source:
          type: string
          enum: [native, task, prayer]
        createdAt:
          type: string
      required:
        - id
        - title
        - startTime
        - allDay
        - source
        - createdAt

    CreateEventBody:
      type: object
      properties:
        title:
          type: string
        description:
          type: ["string", "null"]
        location:
          type: ["string", "null"]
        startTime:
          type: string
        endTime:
          type: ["string", "null"]
        allDay:
          type: boolean
        category:
          type: ["string", "null"]
      required:
        - title
        - startTime

    UpdateEventBody:
      type: object
      properties:
        title:
          type: ["string", "null"]
        description:
          type: ["string", "null"]
        location:
          type: ["string", "null"]
        startTime:
          type: ["string", "null"]
        endTime:
          type: ["string", "null"]
        allDay:
          type: ["boolean", "null"]
        category:
          type: ["string", "null"]

    # ─── PRAYER SCHEMAS ─────────────────────────────────────────────────────────
    Prayer:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
          enum: [Fajr, Dhuhr, Asr, Maghrib, Isha]
        date:
          type: string
        scheduledTime:
          type: ["string", "null"]
        status:
          type: string
          enum: [pending, on_time, late, missed]
        completedAt:
          type: ["string", "null"]
      required:
        - id
        - name
        - date
        - status

    UpdatePrayerBody:
      type: object
      properties:
        status:
          type: string
          enum: [pending, on_time, late, missed]
        scheduledTime:
          type: ["string", "null"]
        completedAt:
          type: ["string", "null"]
      required:
        - status

    SeedPrayersBody:
      type: object
      properties:
        date:
          type: string
          description: Date in YYYY-MM-DD format
        times:
          type: object
          description: Prayer times keyed by prayer name
          properties:
            Fajr:
              type: ["string", "null"]
            Dhuhr:
              type: ["string", "null"]
            Asr:
              type: ["string", "null"]
            Maghrib:
              type: ["string", "null"]
            Isha:
              type: ["string", "null"]
      required:
        - date

    # ─── FOCUS SESSION SCHEMAS ──────────────────────────────────────────────────
    FocusSession:
      type: object
      properties:
        id:
          type: string
        taskId:
          type: ["string", "null"]
        taskTitle:
          type: ["string", "null"]
        durationMinutes:
          type: integer
        status:
          type: string
          enum: [completed, interrupted]
        startedAt:
          type: string
        endedAt:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
      required:
        - id
        - durationMinutes
        - status
        - startedAt

    CreateFocusSessionBody:
      type: object
      properties:
        taskId:
          type: ["string", "null"]
        taskTitle:
          type: ["string", "null"]
        durationMinutes:
          type: integer
        status:
          type: string
          enum: [completed, interrupted]
        startedAt:
          type: string
        endedAt:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
      required:
        - durationMinutes
        - status
        - startedAt

    UpdateFocusSessionBody:
      type: object
      properties:
        durationMinutes:
          type: ["integer", "null"]
        status:
          type: ["string", "null"]
        endedAt:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]

    FocusStats:
      type: object
      properties:
        todayMinutes:
          type: integer
        weekMinutes:
          type: integer
        todaySessions:
          type: integer
        weekSessions:
          type: integer
        dailyBreakdown:
          type: array
          items:
            $ref: "#/components/schemas/DailyFocusBreakdown"
      required:
        - todayMinutes
        - weekMinutes
        - todaySessions
        - weekSessions
        - dailyBreakdown

    DailyFocusBreakdown:
      type: object
      properties:
        date:
          type: string
        minutes:
          type: integer
        sessions:
          type: integer
      required:
        - date
        - minutes
        - sessions

    # ─── DAILY SUMMARY SCHEMA ───────────────────────────────────────────────────
    DailySummary:
      type: object
      properties:
        date:
          type: string
        tasks:
          $ref: "#/components/schemas/SummaryTasks"
        habits:
          $ref: "#/components/schemas/SummaryHabits"
        prayers:
          $ref: "#/components/schemas/SummaryPrayers"
        focus:
          $ref: "#/components/schemas/SummaryFocus"
        events:
          type: array
          items:
            $ref: "#/components/schemas/CalendarEvent"
      required:
        - date
        - tasks
        - habits
        - prayers
        - focus
        - events

    SummaryTasks:
      type: object
      properties:
        total:
          type: integer
        done:
          type: integer
        pending:
          type: integer
        completedTitles:
          type: array
          items:
            type: string
      required:
        - total
        - done
        - pending
        - completedTitles

    SummaryHabits:
      type: object
      properties:
        total:
          type: integer
        completed:
          type: integer
        skipped:
          type: integer
        missed:
          type: integer
        completedNames:
          type: array
          items:
            type: string
      required:
        - total
        - completed
        - skipped
        - missed
        - completedNames

    SummaryPrayers:
      type: object
      properties:
        total:
          type: integer
        onTime:
          type: integer
        late:
          type: integer
        missed:
          type: integer
        pending:
          type: integer
      required:
        - total
        - onTime
        - late
        - missed
        - pending

    SummaryFocus:
      type: object
      properties:
        totalMinutes:
          type: integer
        totalSessions:
          type: integer
        completedSessions:
          type: integer
      required:
        - totalMinutes
        - totalSessions
        - completedSessions
