kind = "web"
previewPath = "/"
title = "Lyra"
version = "1.0.0"
id = "artifacts/lyra"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21533

[services.development]
run = "pnpm --filter @workspace/lyra run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/lyra", "run", "build" ]
publicDir = "artifacts/lyra/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21533"
BASE_PATH = "/"
